<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNest - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-container">
        <!-- Brand Header -->
        <header class="auth-header">
            <h1 class="brand-name">SmartNest</h1>
        </header>

        <!-- Auth Card -->
        <section class="auth-card">
            <h2 class="card-title">Welcome to<br>SmartNest login now!</h2>

            <form action="/api/login" method="POST" class="auth-form" id="loginForm">
                <!-- Email Input -->
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="joedoe75@gmail.com" required autocomplete="email">
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <!-- SVG Eye Icon Crossed (Simplified) -->
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Form Options -->
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span class="checkbox-text">Remember me</span>
                    </label>
                    <a href="/forgot-password" class="forgot-link">Forget password?</a>
                </div>

                <!-- Submit Action -->
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <!-- Social Login -->
            <div class="social-login">
                <p class="social-text">Or Sign in with</p>
                <div class="social-buttons">
                    <button type="button" class="btn-social" aria-label="Sign in with Facebook">
                        <span class="icon-facebook">F</span>
                    </button>
                    <button type="button" class="btn-social" aria-label="Sign in with Google">
                        <span class="icon-google">G</span>
                    </button>
                    <button type="button" class="btn-social" aria-label="Sign in with Apple">
                        <span class="icon-apple">A</span>
                    </button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
